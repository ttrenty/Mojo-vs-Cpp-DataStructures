[workspace]
authors = ["Thomas Trenty"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "CS2525 C++ vs. Mojo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks._generate_hash_assets]
cmd = "python common/generate_hash_assets.py"
inputs = [
    "common/hash_reference.py",
    "common/hash_spec.py",
    "common/hash_spec.json",
    "common/generate_hash_assets.py",
]
outputs = [
    "build/generated/cpp/hash_constants.hpp",
    "build/generated/hash_golden.json",
    "build/generated/mojo/shared/__init__.mojo",
    "build/generated/mojo/shared/hash_constants.mojo",
]

[tasks._build_cpp]
cmd = """
bash -lc '
cmake -S cpp -B build/cpp \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_CXX_COMPILER=${CXX:-clang++} &&
cmake --build build/cpp --parallel
'
"""
inputs = [
    "cpp/CMakeLists.txt",
    "common/hash_reference.py",
    "common/hash_spec.py",
    "common/hash_spec.json",
    "common/generate_hash_assets.py",
    "cpp/include/**/*.hpp",
    "cpp/benches/**/*.cpp",
    "cpp/tools/**/*.cpp",
    "cpp/tests/**/*.cpp",
]
outputs = [
    "build/cpp/cpp_tests",
    "build/cpp/cpp_bench",
    "build/cpp/cpp_hash",
    "build/cpp/cpp_structure_parity",
]

[tasks._test_cpp]
cmd = "./build/cpp/cpp_tests"
depends-on = ["_build_cpp"]

[tasks._test_mojo]
cmd = "mojo run -I mojo/src -I build/generated/mojo mojo/tests/test_main.mojo"
depends-on = ["_generate_hash_assets"]
inputs = [
    "build/generated/mojo/shared/__init__.mojo",
    "build/generated/mojo/shared/hash_constants.mojo",
    "mojo/src/**/*.mojo",
    "mojo/tests/**/*.mojo",
]

[tasks._build_mojo_hash]
cmd = """
bash -lc '
mkdir -p build/mojo &&
mojo build -I mojo/src -I build/generated/mojo mojo/hash_cli.mojo -o build/mojo/mojo_hash
'
"""
depends-on = ["_generate_hash_assets"]
inputs = [
    "build/generated/mojo/shared/__init__.mojo",
    "build/generated/mojo/shared/hash_constants.mojo",
    "mojo/hash_cli.mojo",
    "mojo/src/**/*.mojo",
]
outputs = ["build/mojo/mojo_hash"]

[tasks._build_mojo_structure_parity]
cmd = """
bash -lc '
mkdir -p build/mojo &&
mojo build -I mojo/src -I build/generated/mojo mojo/structure_parity.mojo -o build/mojo/mojo_structure_parity
'
"""
depends-on = ["_generate_hash_assets"]
inputs = [
    "build/generated/mojo/shared/__init__.mojo",
    "build/generated/mojo/shared/hash_constants.mojo",
    "mojo/structure_parity.mojo",
    "mojo/src/**/*.mojo",
]
outputs = ["build/mojo/mojo_structure_parity"]

[tasks._build_mojo_bench]
cmd = """
bash -lc '
mkdir -p build/mojo &&
mojo build -I mojo/src -I build/generated/mojo mojo/bench_main.mojo -o build/mojo/mojo_bench
'
"""
depends-on = ["_generate_hash_assets"]
inputs = [
    "build/generated/mojo/shared/__init__.mojo",
    "build/generated/mojo/shared/hash_constants.mojo",
    "mojo/bench_main.mojo",
    "mojo/src/**/*.mojo",
]
outputs = ["build/mojo/mojo_bench"]

[tasks._test_hash_conformance]
cmd = "python common/verify_hash_conformance.py"
depends-on = ["_generate_hash_assets", "_build_cpp", "_build_mojo_hash"]
inputs = [
    "build/generated/hash_golden.json",
    "common/verify_hash_conformance.py",
    "build/cpp/cpp_hash",
    "build/mojo/mojo_hash",
]

[tasks._test_structure_parity]
cmd = "python common/verify_structure_parity.py"
depends-on = ["_build_cpp", "_build_mojo_structure_parity"]
inputs = [
    "common/verify_structure_parity.py",
    "build/cpp/cpp_structure_parity",
    "build/mojo/mojo_structure_parity",
]

[tasks.tests]
depends-on = [
    "_generate_hash_assets",
    "_test_hash_conformance",
    "_test_structure_parity",
    "_test_cpp",
    "_test_mojo",
]

[tasks._bench_blocked_bloom_cpp_smoke]
cmd = """
bash -lc '
mkdir -p results/raw/smoke &&
if command -v taskset >/dev/null 2>&1; then
  taskset -c 0 ./build/cpp/cpp_bench blocked_bloom --n 100000 --bits-per-key 10 --runs 5 --warmup-runs 1 --query-mode negative > results/raw/smoke/blocked_bloom_cpp_smoke.csv
else
  ./build/cpp/cpp_bench blocked_bloom --n 100000 --bits-per-key 10 --runs 5 --warmup-runs 1 --query-mode negative > results/raw/smoke/blocked_bloom_cpp_smoke.csv
fi
'
"""
depends-on = ["_build_cpp"]
inputs = ["build/cpp/cpp_bench"]
outputs = ["results/raw/smoke/blocked_bloom_cpp_smoke.csv"]

[tasks._bench_blocked_bloom_mojo_smoke]
cmd = """
bash -lc '
mkdir -p results/raw/smoke &&
if command -v taskset >/dev/null 2>&1; then
  taskset -c 0 ./build/mojo/mojo_bench blocked_bloom --n 100000 --bits-per-key 10 --runs 5 --warmup-runs 1 --query-mode negative > results/raw/smoke/blocked_bloom_mojo_smoke.csv
else
  ./build/mojo/mojo_bench blocked_bloom --n 100000 --bits-per-key 10 --runs 5 --warmup-runs 1 --query-mode negative > results/raw/smoke/blocked_bloom_mojo_smoke.csv
fi
'
"""
depends-on = ["_build_mojo_bench"]
inputs = ["build/mojo/mojo_bench"]
outputs = ["results/raw/smoke/blocked_bloom_mojo_smoke.csv"]

[tasks._bench_quotient_filter_cpp_smoke]
cmd = """
bash -lc '
mkdir -p results/raw/smoke &&
if command -v taskset >/dev/null 2>&1; then
  taskset -c 0 ./build/cpp/cpp_bench quotient_filter --q 12 --remainder-bits 10 --target-load 0.7 --runs 5 --warmup-runs 1 --workload read_heavy --op-count 5000 > results/raw/smoke/quotient_filter_cpp_smoke.csv
else
  ./build/cpp/cpp_bench quotient_filter --q 12 --remainder-bits 10 --target-load 0.7 --runs 5 --warmup-runs 1 --workload read_heavy --op-count 5000 > results/raw/smoke/quotient_filter_cpp_smoke.csv
fi
'
"""
depends-on = ["_build_cpp"]
inputs = ["build/cpp/cpp_bench"]
outputs = ["results/raw/smoke/quotient_filter_cpp_smoke.csv"]

[tasks._bench_quotient_filter_mojo_smoke]
cmd = """
bash -lc '
mkdir -p results/raw/smoke &&
if command -v taskset >/dev/null 2>&1; then
  taskset -c 0 ./build/mojo/mojo_bench quotient_filter --q 12 --remainder-bits 10 --target-load 0.7 --runs 5 --warmup-runs 1 --workload read_heavy --op-count 5000 > results/raw/smoke/quotient_filter_mojo_smoke.csv
else
  ./build/mojo/mojo_bench quotient_filter --q 12 --remainder-bits 10 --target-load 0.7 --runs 5 --warmup-runs 1 --workload read_heavy --op-count 5000 > results/raw/smoke/quotient_filter_mojo_smoke.csv
fi
'
"""
depends-on = ["_build_mojo_bench"]
inputs = ["build/mojo/mojo_bench"]
outputs = ["results/raw/smoke/quotient_filter_mojo_smoke.csv"]

[tasks._bench_elias_fano_cpp_smoke]
cmd = """
bash -lc '
mkdir -p results/raw/smoke &&
if command -v taskset >/dev/null 2>&1; then
  taskset -c 0 ./build/cpp/cpp_bench elias_fano --n 5000 --universe-factor 64 --runs 5 --warmup-runs 1 --workload predecessor --op-count 5000 > results/raw/smoke/elias_fano_cpp_smoke.csv
else
  ./build/cpp/cpp_bench elias_fano --n 5000 --universe-factor 64 --runs 5 --warmup-runs 1 --workload predecessor --op-count 5000 > results/raw/smoke/elias_fano_cpp_smoke.csv
fi
'
"""
depends-on = ["_build_cpp"]
inputs = ["build/cpp/cpp_bench"]
outputs = ["results/raw/smoke/elias_fano_cpp_smoke.csv"]

[tasks._bench_elias_fano_mojo_smoke]
cmd = """
bash -lc '
mkdir -p results/raw/smoke &&
if command -v taskset >/dev/null 2>&1; then
  taskset -c 0 ./build/mojo/mojo_bench elias_fano --n 5000 --universe-factor 64 --runs 5 --warmup-runs 1 --workload predecessor --op-count 5000 > results/raw/smoke/elias_fano_mojo_smoke.csv
else
  ./build/mojo/mojo_bench elias_fano --n 5000 --universe-factor 64 --runs 5 --warmup-runs 1 --workload predecessor --op-count 5000 > results/raw/smoke/elias_fano_mojo_smoke.csv
fi
'
"""
depends-on = ["_build_mojo_bench"]
inputs = ["build/mojo/mojo_bench"]
outputs = ["results/raw/smoke/elias_fano_mojo_smoke.csv"]

[tasks.bench_tests]
depends-on = [
    "_bench_blocked_bloom_cpp_smoke",
    "_bench_blocked_bloom_mojo_smoke",
    "_bench_quotient_filter_cpp_smoke",
    "_bench_quotient_filter_mojo_smoke",
    "_bench_elias_fano_cpp_smoke",
    "_bench_elias_fano_mojo_smoke",
]

[tasks.bench_representative]
cmd = "python common/run_benchmarks.py --profile representative"
inputs = [
    "common/run_benchmarks.py",
    "common/params.json",
    "common/hash_reference.py",
    "common/hash_spec.py",
    "common/hash_spec.json",
    "common/generate_hash_assets.py",
    "common/analysis/collect_build_metrics.py",
