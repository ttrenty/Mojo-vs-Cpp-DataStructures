outputs = [
    "results/raw/full/full_blocked_bloom_cpp.csv",
    "results/raw/full/full_blocked_bloom_mojo.csv",
    "results/raw/full/full_quotient_filter_cpp.csv",
    "results/raw/full/full_quotient_filter_mojo.csv",
    "results/raw/full/full_elias_fano_cpp.csv",
    "results/raw/full/full_elias_fano_mojo.csv",
