[tasks.plot_results_full_parallel]
cmd = "python common/plots/plot_results.py --profile full --summary results/processed/full_parallel_summary.csv --output-dir-name full_parallel"
depends-on = ["_summarize_full_parallel_results", "_code_metrics", "_build_metrics"]
inputs = [
    "common/plots/plot_results.py",
    "results/processed/full_parallel_summary.csv",
    "results/processed/code_metrics.csv",
    "results/processed/build_metrics.csv",
