    "results/raw/full_parallel/full_quotient_filter_mojo.csv",
    "results/raw/full_parallel/full_elias_fano_cpp.csv",
    "results/raw/full_parallel/full_elias_fano_mojo.csv",
]

[tasks._code_metrics]
cmd = "python common/code_metrics.py"
inputs = [
    "common/code_metrics.py",
    "common/compare_implementations.py",
    "cpp/**/*.hpp",
    "cpp/**/*.cpp",
    "mojo/**/*.mojo",
]
outputs = ["results/processed/code_metrics.csv"]

[tasks.compare_impls]
cmd = "python common/compare_implementations.py"
inputs = [
    "common/compare_implementations.py",
    "common/implementation_compare_spec.json",
    "cpp/include/**/*.hpp",
    "cpp/tools/**/*.cpp",
    "mojo/**/*.mojo",
]
outputs = [
    "results/processed/implementation_compare.html",
    "results/processed/implementation_compare.md",
    "results/processed/implementation_compare.json",
]

[tasks.compare_impls_check]
cmd = "python common/compare_implementations.py --check"
inputs = [
    "common/compare_implementations.py",
    "common/implementation_compare_spec.json",
    "cpp/include/**/*.hpp",
    "cpp/tools/**/*.cpp",
    "mojo/**/*.mojo",
]

[tasks._summarize_smoke_results]
cmd = "python common/analysis/summarize_results.py --profile smoke"
inputs = ["common/analysis/summarize_results.py", "results/raw/smoke/*.csv"]
outputs = ["results/processed/smoke_summary.csv"]

[tasks._summarize_representative_results]
cmd = "python common/analysis/summarize_results.py --profile representative"
inputs = ["common/analysis/summarize_results.py", "results/raw/representative/*.csv"]
outputs = ["results/processed/representative_summary.csv"]

[tasks._summarize_representative_parallel_results]
cmd = "python common/analysis/summarize_results.py --profile representative --raw-dir-name representative_parallel --output results/processed/representative_parallel_summary.csv"
inputs = ["common/analysis/summarize_results.py", "results/raw/representative_parallel/*.csv"]
outputs = ["results/processed/representative_parallel_summary.csv"]

[tasks._summarize_report_results]
depends-on = ["_summarize_representative_results"]

[tasks._summarize_full_results]
cmd = "python common/analysis/summarize_results.py --profile full"
inputs = ["common/analysis/summarize_results.py", "results/raw/full/*.csv"]
outputs = ["results/processed/full_summary.csv"]

[tasks._summarize_full_parallel_results]
cmd = "python common/analysis/summarize_results.py --profile full --raw-dir-name full_parallel --output results/processed/full_parallel_summary.csv"
inputs = ["common/analysis/summarize_results.py", "results/raw/full_parallel/*.csv"]
outputs = ["results/processed/full_parallel_summary.csv"]

[tasks._build_metrics]
cmd = "python common/analysis/collect_build_metrics.py"
inputs = [
    "common/analysis/collect_build_metrics.py",
    "common/hash_reference.py",
    "common/hash_spec.py",
    "common/hash_spec.json",
    "common/generate_hash_assets.py",
    "cpp/CMakeLists.txt",
    "cpp/include/**/*.hpp",
    "cpp/benches/**/*.cpp",
    "mojo/bench_main.mojo",
    "mojo/src/**/*.mojo",
]
outputs = ["results/processed/build_metrics.csv"]

[tasks.plot_results_smoke]
cmd = "python common/plots/plot_results.py --profile smoke"
