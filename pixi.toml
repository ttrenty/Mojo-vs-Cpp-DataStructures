[tasks.bench_full_parallel]
cmd = "python common/run_benchmarks.py --profile full --parallel-workers 0 --reserve-cores 4 --output-dir-name full_parallel"
inputs = [
    "common/run_benchmarks.py",
    "common/params.json",
    "common/hash_reference.py",
    "common/hash_spec.py",
    "common/hash_spec.json",
    "common/generate_hash_assets.py",
