    "results/figures/full_parallel/fig11_qf_remainder_sweep.png",
    "results/figures/full_parallel/fig12_metrics_dashboard.png",
    "results/figures/full_parallel/fig13_memory_efficiency.png",
]

[tasks.plot_results_full]
depends-on = ["plot_results"]

[tasks.bench_representative_and_plot]
depends-on = ["bench_representative", "plot_results_representative"]

[tasks.bench_representative_parallel_and_plot]
depends-on = ["bench_representative_parallel", "plot_results_representative_parallel"]

[tasks.bench_report_and_plot]
depends-on = ["bench_representative_and_plot"]

[tasks.bench_full_and_plot]
depends-on = ["bench_full", "plot_results"]

[tasks.bench_full_parallel_and_plot]
depends-on = ["bench_full_parallel", "plot_results_full_parallel"]

[tasks.clean]
cmd = "rm -rf build"

[tasks.reset]
cmd = "rm -rf build results"

[dependencies]
mojo = ">=0.26.3.0.dev2026031705,<0.27"
python = ">=3.14.3,<3.15"
matplotlib = ">=3.10.8,<4"
