    "results/raw/representative/representative_quotient_filter_cpp.csv",
    "results/raw/representative/representative_quotient_filter_mojo.csv",
    "results/raw/representative/representative_elias_fano_cpp.csv",
    "results/raw/representative/representative_elias_fano_mojo.csv",
]

[tasks.bench_representative_parallel]
cmd = "python common/run_benchmarks.py --profile representative --parallel-workers 0 --reserve-cores 4 --output-dir-name representative_parallel"
inputs = [
    "common/run_benchmarks.py",
    "common/params.json",
    "common/hash_reference.py",
    "common/hash_spec.py",
    "common/hash_spec.json",
    "common/generate_hash_assets.py",
