    "results/raw/representative_parallel/representative_blocked_bloom_mojo.csv",
    "results/raw/representative_parallel/representative_quotient_filter_cpp.csv",
    "results/raw/representative_parallel/representative_quotient_filter_mojo.csv",
    "results/raw/representative_parallel/representative_elias_fano_cpp.csv",
    "results/raw/representative_parallel/representative_elias_fano_mojo.csv",
]

[tasks.bench_report]
depends-on = ["bench_representative"]

[tasks.bench_full]
cmd = "python common/run_benchmarks.py --profile full"
inputs = [
    "common/run_benchmarks.py",
    "common/params.json",
    "common/hash_reference.py",
    "common/hash_spec.py",
    "common/hash_spec.json",
    "common/generate_hash_assets.py",
    "common/analysis/collect_build_metrics.py",
    "cpp/CMakeLists.txt",
